<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DECOBIZ | L'Art de la Maison</title>
    
    <!-- POLICES DE LUXE (Playfair Display pour titres, Lato pour texte) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- DESIGN SYSTEM: LUXE EDITION --- */
        :root {
            /* Palette "Chic & Timeless" */
            --bg-body: #F9F7F2;       /* Crème Antique */
            --bg-card: #FFFFFF;       /* Blanc Pur */
            --text-primary: #1A1A1A; /* Noir Charbon */
            --text-secondary: #6B6B6B; /* Gris Doux */
            --accent-gold: #C5A059;   /* Or Antique */
            --accent-rose: #D4AF37;   /* Or Mat */
            --promo-red: #8E1C1C;     /* Bordeaux Profond */
            
            --shadow-soft: 0 20px 40px rgba(0,0,0,0.04);
            --shadow-hover: 0 25px 50px rgba(0,0,0,0.08);
            --radius-sm: 4px; /* Coins moins arrondis pour un look plus sérieux */
            
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Lato', sans-serif;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html { scroll-behavior: smooth; font-size: 16px; }
        
        body { 
            font-family: var(--font-sans); 
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- TYPOGRAPHIE --- */
        h1, h2, h3, .price-tag, .logo { font-family: var(--font-serif); font-weight: 600; }
        .text-gold { color: var(--accent-gold); }
        .text-serif { font-family: var(--font-serif); font-style: italic; }

        /* --- HEADER --- */
        header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(249, 247, 242, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            padding: 15px 0;
            transition: var(--transition);
        }
        .nav-container { 
            max-width: 1200px; margin: 0 auto; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { 
            font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; 
            color: var(--text-primary); cursor: pointer; text-decoration: none;
        }
        .logo span { color: var(--accent-gold); }
        
        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { 
            position: relative; color: var(--text-primary); font-size: 1.1rem; cursor: pointer; transition: color 0.3s;
        }
        .icon-btn:hover { color: var(--accent-gold); }
        .cart-badge {
            position: absolute; top: -5px; right: -8px; 
            background: var(--accent-gold); color: white; 
            font-size: 0.6rem; width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-family: var(--font-sans);
            opacity: 0; transition: opacity 0.3s;
        }
        .cart-badge.visible { opacity: 1; }

        /* --- HERO SECTION --- */
        .hero {
            height: 80vh; min-height: 500px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: white;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            /* Filtre sombre pour lisibilité du texte */
            filter: brightness(0.6) contrast(1.1);
        }
        .hero-content {
            position: relative; z-index: 2;
            max-width: 800px; padding: 0 20px;
            animation: fadeUp 1.2s ease-out;
        }
        .hero-subtitle {
            text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem;
            margin-bottom: 20px; display: block; color: var(--accent-gold);
            font-weight: 700;
        }
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .btn-luxe {
            padding: 16px 40px; background: transparent; border: 1px solid white;
            color: white; font-family: var(--font-sans); text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.75rem; font-weight: 700;
            transition: var(--transition); cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .btn-luxe:hover {
            background: white; color: var(--text-primary);
        }

        /* --- SECTIONS --- */
        .section-padding { padding: 80px 20px; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-title {
            font-size: 2.5rem; color: var(--text-primary); margin-bottom: 10px; font-style: italic;
        }
        .section-divider {
            width: 60px; height: 2px; background: var(--accent-gold); margin: 0 auto;
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr;
            gap: 40px;
        }
        @media(min-width: 600px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1000px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media(min-width: 1400px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        /* --- PRODUCT CARD --- */
        .product-card {
            background: transparent;
            position: relative;
            cursor: pointer;
            group: 'hover';
        }
        
        .card-image-wrapper {
            position: relative; overflow: hidden; margin-bottom: 20px;
            aspect-ratio: 3/4; /* Ratio portrait mode */
        }
        .card-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .product-card:hover .card-img { transform: scale(1.05); }
        
        /* Overlays & Badges */
        .card-overlay {
            position: absolute; top: 15px; left: 15px; z-index: 2;
            display: flex; flex-direction: column; gap: 8px;
        }
        .badge-luxe {
            padding: 6px 12px; background: rgba(255,255,255,0.9);
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;
            font-weight: 700; color: var(--text-primary);
            backdrop-filter: blur(4px);
        }
        .badge-promo { background: var(--promo-red); color: white; }
        .badge-custo { background: var(--accent-gold); color: white; }

        /* Bouton apparaissant au survol */
        .quick-add-btn {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; color: var(--text-primary);
            padding: 15px; text-align: center; text-transform: uppercase;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
            transform: translateY(100%); transition: var(--transition);
            z-index: 3;
        }
        .product-card:hover .quick-add-btn { transform: translateY(0); }

        /* Card Info */
        .card-info { text-align: center; padding: 0 10px; }
        .product-name {
            font-size: 1.1rem; color: var(--text-primary); margin-bottom: 8px;
            font-family: var(--font-serif); font-weight: 500;
        }
        .price-container {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: var(--font-serif);
        }
        .old-price-luxe {
            text-decoration: line-through; color: #BBB; font-size: 0.9rem; font-weight: 400;
        }
        .price-tag {
            font-size: 1.2rem; color: var(--text-primary); font-weight: 600;
        }
        .price-tag.promo { color: var(--promo-red); }

        /* --- MODAL (Personnalisation) --- */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-backdrop.active { opacity: 1; }
        
        .modal-box {
            background: white; width: 90%; max-width: 500px;
            padding: 40px; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-backdrop.active .modal-box { transform: translateY(0); }

        .close-modal {
            position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #AAA;
        }
        
        .form-group { margin-bottom: 25px; }
        .form-label {
            display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 8px; color: var(--text-secondary); font-weight: 700;
        }
        .input-luxe {
            width: 100%; border: none; border-bottom: 1px solid #DDD;
            padding: 10px 0; font-family: var(--font-serif); font-size: 1.1rem;
            transition: border-color 0.3s; background: transparent;
        }
        .input-luxe:focus { border-color: var(--accent-gold); outline: none; }

        .btn-confirm {
            width: 100%; background: var(--text-primary); color: white; padding: 16px;
            border: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; transition: background 0.3s;
        }
        .btn-confirm:hover { background: var(--accent-gold); }

        /* --- CART SIDEBAR --- */
        .cart-drawer {
            position: fixed; top: 0; right: 0; width: 100%; max-width: 450px; height: 100vh;
            background: white; z-index: 2001; box-shadow: -20px 0 60px rgba(0,0,0,0.1);
            transform: translateX(100%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        .cart-drawer.open { transform: translateX(0); }

        .cart-header {
            padding: 30px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center;
        }
        .cart-body { flex: 1; overflow-y: auto; padding: 30px; }
        .cart-footer { padding: 30px; background: #FAFAFA; border-top: 1px solid #EEE; }

        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; }
        .cart-thumb { width: 80px; height: 100px; object-fit: cover; }
        .cart-details { flex: 1; }
        .cart-item-title { font-family: var(--font-serif); font-size: 1rem; margin-bottom: 5px; }
        .cart-custo { font-size: 0.8rem; color: var(--accent-gold); margin-bottom: 5px; font-style: italic; }
        .cart-remove { font-size: 0.7rem; text-decoration: underline; color: #999; cursor: pointer; margin-top: 10px; display: inline-block;}

        .row-total { display: flex; justify-content: space-between; font-family: var(--font-serif); font-size: 1.4rem; margin-top: 15px; }
        .row-sub { display: flex; justify-content: space-between; color: #666; font-size: 0.9rem; margin-bottom: 5px; }

        /* --- FOOTER --- */
        footer { background: #111; color: #FFF; padding: 60px 20px; text-align: center; margin-top: 80px; }
        .footer-logo { font-family: var(--font-serif); font-size: 2rem; margin-bottom: 20px; font-style: italic; }
        .socials a { color: white; margin: 0 10px; font-size: 1.2rem; transition: 0.3s; }
        .socials a:hover { color: var(--accent-gold); }

        /* --- ANIMATION --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="nav-container">
            <a href="#" class="logo">Decobiz<span>.</span></a>
            <div class="nav-icons">
                <div class="icon-btn" onclick="toggleCart()">
                    <i class="fa-solid fa-shopping-bag"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <img src="rose.jpeg" class="hero-bg" alt="Luxe Decobiz">
        <div class="hero-content">
            <span class="hero-subtitle">Collection Signature 2024</span>
            <h1 class="hero-title">L'Élégance du Détail</h1>
            <button class="btn-luxe" onclick="document.getElementById('shop').scrollIntoView()">Découvrir la Collection</button>
        </div>
    </section>

    <!-- SHOP SECTION -->
    <section id="shop" class="section-padding">
        <div class="section-header">
            <h2 class="section-title">Nos Créations</h2>
            <div class="section-divider"></div>
            <p style="margin-top:15px; color:#666; font-style:italic;">Pièces uniques & Packs exclusifs</p>
        </div>

        <div class="product-grid" id="grid-container">
            <!-- JS Injected -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Decobiz.</div>
        <div class="socials">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        <p style="margin-top:20px; color:#555; font-size:0.8rem;">&copy; 2024 Decobiz Creations. Tous droits réservés.</p>
    </footer>

    <!-- MODAL CUSTOMIZATION -->
    <div class="modal-backdrop" id="custom-modal">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 style="font-family:var(--font-serif); font-size:1.8rem; margin-bottom:10px; text-align:center;">Atelier Personnalisation</h3>
            <p id="modal-prod-name" style="text-align:center; color:#888; margin-bottom:30px; font-style:italic;">Produit</p>

            <div class="form-group">
                <label class="form-label">Teinte & Finition</label>
                <input type="text" id="cust-color" class="input-luxe" placeholder="Ex: Blanc cassé, Or vieilli...">
            </div>

            <div class="form-group" id="grp-text" style="display:none;">
                <label class="form-label">Gravure / Monogramme</label>
                <input type="text" id="cust-text" class="input-luxe" placeholder="Vos initiales ou un message...">
            </div>

            <button class="btn-confirm" onclick="addCustomItem()">Ajouter au Panier</button>
        </div>
    </div>

    <!-- CART DRAWER -->
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3 style="font-family:var(--font-serif);">Votre Sélection</h3>
            <span class="close-modal" onclick="toggleCart()">&times;</span>
        </div>

        <div id="view-list" style="display:flex; flex-direction:column; height:100%;">
            <div class="cart-body" id="cart-items">
                <!-- Items -->
            </div>
            <div class="cart-footer">
                <div class="row-sub"><span>Sous-total</span> <span id="lbl-sub">0 MAD</span></div>
                <div class="row-sub"><span>Livraison</span> <span id="lbl-ship">Calculée à l'étape</span></div>
                <div class="section-divider" style="margin:15px 0; background:#DDD;"></div>
                <div class="row-total"><span>Total</span> <span id="lbl-total">0 MAD</span></div>
                <button class="btn-confirm" style="margin-top:20px;" onclick="openCheckout()">Finaliser la commande</button>
            </div>
        </div>

        <!-- CHECKOUT FORM -->
        <div id="view-form" style="display:none; height:100%; overflow-y:auto; padding:30px;">
            <button onclick="closeCheckout()" style="background:none; border:none; text-decoration:underline; cursor:pointer; margin-bottom:20px; color:#888;">&larr; Retour</button>
            <h3 style="font-family:var(--font-serif); margin-bottom:20px;">Livraison</h3>
            <form id="order-form" action="https://formspree.io/f/xeevpgvy" method="POST">
                <input type="hidden" name="order_details" id="inp-details">
                <input type="hidden" name="total_price" id="inp-total">
                <div class="form-group">
                    <label class="form-label">Nom complet</label>
                    <input type="text" name="name" class="input-luxe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Téléphone</label>
                    <input type="tel" name="phone" class="input-luxe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Ville</label>
                    <input type="text" name="city" id="city-inp" class="input-luxe" required onblur="updateShipCalc()">
                    <small id="ship-note" style="color:var(--accent-gold); display:block; margin-top:5px;"></small>
                </div>
                <div class="form-group">
                    <label class="form-label">Adresse</label>
                    <textarea name="address" class="input-luxe" rows="2" required></textarea>
                </div>
                <button type="submit" class="btn-confirm">Confirmer la commande</button>
            </form>
        </div>
    </div>

    <script>
        // --- DATA ---
        const products = [
            { id: 101, title: "Le Salon Moderne", price: 135, img: "salon.jpeg", desc: "Harmonie parfaite.", type: "color" },

            { id: 12, title: "Coquille", price: 29, img: "coquille.jpg", desc: "Océan.", type: "color" },

            { id: 14, title: "Ovale", price: 55, img: "ovale23.jpeg", desc: "Classique.", type: "color" },
            { id: 15, title: "Lavande", price: 165, img: "lavande.jpeg", desc: "Provence.", type: "color" },

            { id: 18, title: "Union", price: 115, img: "https://z-cdn-media.chatglm.cn/files/7cb167c2-627a-46ea-bcd1-a74547c0ad75.jpeg?auth_key=1875337220-7e19d2bd7c574cd4b4e9ce96e43bb2ad-0-de3689e91bf860fe1647fa5870b2ebb7", desc: "Éternel.", type: "mix" }
        ];

        let cart = [];
        let currProd = null;

        function init() {
            render();
        }

        function render() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = products.map(p => {
                const old = Math.round(p.price * 1.2);
                return `
                <div class="product-card">
                    <div class="card-image-wrapper">
                        <div class="card-overlay">
                            <span class="badge-luxe badge-promo">PROMO</span>
                            <span class="badge-luxe badge-custo">PERSONNALISABLE</span>
                        </div>
                        <img src="${p.img}" class="card-img" loading="lazy" onerror="this.src='https://via.placeholder.com/400x500?text=Luxe'">
                        <button class="quick-add-btn" onclick="openModal(${p.id})">Personnaliser & Ajouter</button>
                    </div>
                    <div class="card-info">
                        <div class="product-name">${p.title}</div>
                        <div class="price-container">
                            <span class="old-price-luxe">${old} DH</span>
                            <span class="price-tag promo">${p.price} DH</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Modal Logic
        function openModal(id) {
            currProd = products.find(p => p.id === id);
            document.getElementById('modal-prod-name').innerText = currProd.title;
            document.getElementById('cust-color').value = "";
            document.getElementById('cust-text').value = "";
            
            const grpText = document.getElementById('grp-text');
            grpText.style.display = (currProd.type === 'logo' || currProd.type === 'mix') ? 'block' : 'none';

            const md = document.getElementById('custom-modal');
            md.style.display = 'flex';
            setTimeout(() => md.classList.add('active'), 10);
        }

        function closeModal() {
            const md = document.getElementById('custom-modal');
            md.classList.remove('active');
            setTimeout(() => md.style.display = 'none', 400);
        }

        function addCustomItem() {
            const color = document.getElementById('cust-color').value;
            const text = document.getElementById('cust-text').value;
            
            const item = { ...currProd };
            item.custo = [];
            if(color) item.custo.push(`Couleur: ${color}`);
            if(text) item.custo.push(`Gravure: "${text}"`);

            cart.push(item);
            updateCartUI();
            closeModal();
            toggleCart(true);
        }

        // Cart Logic
        function toggleCart(forceOpen = false) {
            const dr = document.getElementById('cart-drawer');
            if(forceOpen || dr.classList.contains('open')) {
                dr.classList.toggle('open');
            } else if(cart.length > 0) {
                dr.classList.add('open');
            }
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.toggle('visible', cart.length > 0);

            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#999; font-style:italic; margin-top:50px;">Votre panier est vide.</div>`;
                document.querySelector('.cart-footer').style.display = 'none';
            } else {
                document.querySelector('.cart-footer').style.display = 'block';
                let sub = 0;
                container.innerHTML = cart.map((item, i) => {
                    sub += item.price;
                    return `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-thumb">
                        <div class="cart-details">
                            <div class="cart-item-title">${item.title}</div>
                            ${item.custo.length ? `<div class="cart-custo">${item.custo.join(', ')}</div>` : ''}
                            <div style="font-weight:600;">${item.price} DH</div>
                            <div class="cart-remove" onclick="remItem(${i})">Retirer</div>
                        </div>
                    </div>
                    `;
                }).join('');
                
                document.getElementById('lbl-sub').innerText = sub + ' DH';
                updateShipCalc(); // Recalculate total based on city
            }
        }

        function remItem(i) {
            cart.splice(i, 1);
            updateCartUI();
        }

        // Checkout Logic
        function openCheckout() {
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-form').style.display = 'block';
        }

        function closeCheckout() {
            document.getElementById('view-form').style.display = 'none';
            document.getElementById('view-list').style.display = 'flex';
        }

        function updateShipCalc() {
            if(cart.length === 0) return;
            const sub = cart.reduce((a,b)=>a+b.price,0);
            const city = document.getElementById('city-inp').value.toLowerCase();
            let ship = 35;
            let note = "";

            if(sub >= 399) { ship = 0; note = "Livraison Offerte"; }
            else if(city.includes('khouribga')) { ship = 20; note = "Tarif Local"; }
            else { note = "Livraison Standard"; }

            document.getElementById('lbl-ship').innerText = ship === 0 ? "Offerte" : ship + ' DH';
            document.getElementById('lbl-total').innerText = (sub + ship) + ' DH';
            document.getElementById('ship-note').innerText = note;
            document.getElementById('inp-total').value = (sub + ship) + ' DH';
            
            const details = cart.map(i => `- ${i.title} (${i.price} DH) ${i.custo.length ? '-> '+i.custo.join(', ') : ''}`).join('\n');
            document.getElementById('inp-details').value = details;
        }

        document.getElementById('order-form').addEventListener('submit', async function(e){
            e.preventDefault();
            const btn = this.querySelector('button');
            const old = btn.innerText;
            btn.innerText = "Traitement...";
            btn.disabled = true;

            await fetch(this.action, {
                method:'POST', body: new FormData(this), headers:{'Accept':'application/json'}
            }).then(r => {
                if(r.ok) {
                    document.getElementById('view-form').style.display = 'none';
                    document.getElementById('view-list').style.display = 'none'; // Hide list too
                    document.querySelector('.cart-body').innerHTML = `
                        <div style="text-align:center; padding:40px 0;">
                            <i class="fa-regular fa-circle-check" style="font-size:3rem; color:var(--accent-gold);"></i>
                            <h3 style="font-family:var(--font-serif); margin:20px 0;">Commande Confirmée</h3>
                            <p>Merci pour votre confiance.</p>
                            <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border:1px solid #000; background:white; cursor:pointer;">Retour Boutique</button>
                        </div>`;
                    document.querySelector('.cart-footer').style.display = 'none';
                    cart = []; updateCartUI();
                } else {
                    alert("Erreur."); btn.innerText=old; btn.disabled=false;
                }
            });
        });

        init();
    </script>
</body>
</html>
